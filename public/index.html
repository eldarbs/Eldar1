        // Custom Synthesized Audio Engine (No external dependencies)
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'success') {
                    // Upward arpeggio
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(330, ctx.currentTime); // E4
                    osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.3); // E5
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.32);
                } else if (type === 'error') {
                    // Downward buzz
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'click') {
                    // Quick pop
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(500, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'level-up') {
                    // Majestic trumpet sound
                    const now = ctx.currentTime;
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(261.63, now); // C4
                    osc.frequency.setValueAtTime(329.63, now + 0.1); // E4
                    osc.frequency.setValueAtTime(392.00, now + 0.2); // G4
                    osc.frequency.setValueAtTime(523.25, now + 0.3); // C5
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0.1, now + 0.4);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
                    osc.start();
                    osc.stop(now + 0.6);
                }
            } catch (e) {
                console.log("Audio contexts aren't fully active yet or not supported.");
            }
        };

            const [searchTerm, setSearchTerm] = useState('');

            // AI Chavruta states
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemara_spark_api_key') || window.GEMARA_SPARK_CONFIG?.apiKey || '');

                { role: 'model', text: 'שלום עליכם! אני החברותא הדיגיטלי שלך. בחר סוגיה מלמעלה או שאל אותי כל שאלה על סוגיות הגמרא שתרצה לדעת. במה נתחיל ללמוד היום?' }
            ]);
            const [userChatInput, setUserChatInput] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [selectedChatSugya, setSelectedChatSugya] = useState(SUGYOT[0].id);

            // Invoice Extractor states
            const [invoiceFile, setInvoiceFile] = useState(null);
            const [pdfPreviewUrl, setPdfPreviewUrl] = useState('');
            const [isExtracting, setIsExtracting] = useState(false);
            const [extractedData, setExtractedData] = useState(null);

            // Custom Notification Toast
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const triggerToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                playSound(type);
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3500);
            };

            const runBattleSimulation = (playerChoice) => {
                if (isBattling) return;
                setIsBattling(true);
                setBattleWinner(null);
                setBattleLog([]);
                playSound('click');

                const opponent = CHARACTERS.find(c => c.name !== playerChoice.name);
                let log = [];
                log.push({ text: `⚔️ הקרב מתחיל! ${playerChoice.emoji} ${playerChoice.name} נגד ${opponent.emoji} ${opponent.name}`, type: 'intro' });

                setTimeout(() => {
                    log.push({ text: `🎤 הנושא הנדון: "מצאת ארנק ברחוב שהבעלים עוד לא גילה שנאבד לו"`, type: 'topic' });
                    setBattleLog([...log]);
                }, 800);

                setTimeout(() => {
                    log.push({ 
                        text: `🗣️ ${playerChoice.name} מטיל את קלף השילוב: "${playerChoice.specialMove}"!`, 
                        type: 'attack' 
                    });
                    setBattleLog([...log]);
                    playSound('click');
                }, 1800);

                setTimeout(() => {
                    log.push({ 
                        text: `🛡️ ${opponent.name} מגיב במתקפת נגד מבריקה ומצטט מסכת שלמה כדי להדוף!`, 
                        type: 'defense' 
                    });
                    setBattleLog([...log]);
                    playSound('click');
                }, 3000);

                setTimeout(() => {
                    // Decide winner based on stats & slight random offset
                    const playerPower = playerChoice.stats.logic + playerChoice.stats.speed + Math.floor(Math.random() * 10);
                    const opponentPower = opponent.stats.logic + opponent.stats.speed + Math.floor(Math.random() * 10);
                    
                    let winner = playerPower >= opponentPower ? playerChoice : opponent;
                    
                    // Historic Easter egg: Rava wins most of the time unless it is one of the YAL...
                    if (playerChoice.name === 'רבא' && Math.random() > 0.3) {
                        winner = playerChoice;
                    }

                    log.push({ 
                        text: `🏆 תוצאה: השכל הישר ניצח! ${winner.name} קיבל את הכרעת בת הקול של בית המדרש!`, 
                        type: 'victory' 
                    });
                    setBattleLog([...log]);
                    setBattleWinner(winner);
                    setIsBattling(false);
                    triggerToast(`הקרב הסתיים! הניצחון ל${winner.name}`, 'level-up');
                }, 4500);
            };

            const handleQuizAnswer = (option, idx) => {
                if (isAnswered) return;
                setSelectedOption(idx);
                setIsAnswered(true);

                if (option.isCorrect) {
                    setScore(prev => prev + 10);
                    setStreak(prev => prev + 1);
                    triggerToast('מדהים! תשובה נכונה פירקה את הקושיא! 🔥', 'success');
                } else {
                    setStreak(0);
                    triggerToast('לא מדויק, אבל מכל קושיה לומדים משהו חדש! 💡', 'error');

            };

            const nextQuestion = () => {

                if (currentQuizIndex < QUIZ.length - 1) {

                                                            msg.role === 'user'
                                                                ? 'bg-amber-500/10 border-amber-500/20 text-amber-100 rounded-tr-none'
                                                                : 'bg-slate-950/60 border-slate-800/80 text-gray-200 rounded-tl-none font-serif'
                                                        }`}>
                                                            <p className="whitespace-pre-wrap">{msg.text}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                                {isGenerating && (
                                                    <div className="flex gap-3 max-w-[80%] ml-auto">
                                                        <div className="w-9 h-9 rounded-xl bg-blue-600 text-white flex items-center justify-center shrink-0 animate-pulse">
                                                            <i className="fa-solid fa-brain"></i>
                                                        </div>
                                                        <div className="bg-slate-950/40 border border-slate-800/40 p-4 rounded-2xl rounded-tl-none text-sm text-gray-500 flex items-center gap-2">
                                                            <div className="flex gap-1">
                                                                <span className="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                                                                <span className="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                                                                <span className="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                                                            </div>
                                                            <span>החברותא מעמיק בדף...</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>

                                            {/* Chat input form */}
                                            <form onSubmit={handleSendMessage} className="flex gap-2 shrink-0 border-t border-slate-800/60 pt-4">
                                                <input
                                                    type="text"
                                                    placeholder={isGenerating ? "מחכה לתשובה..." : "כתוב הודעה לחברותא הדיגיטלי..."}
                                                    value={userChatInput}
                                                    onChange={(e) => setUserChatInput(e.target.value)}
                                                    disabled={isGenerating}
                                                    className="flex-grow bg-slate-950 border border-slate-800/80 rounded-2xl py-3.5 px-5 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-amber-500 transition-all disabled:opacity-50"
                                                />
                                                <button
                                                    type="submit"
                                                    disabled={!userChatInput.trim() || isGenerating}
                                                    className={`px-6 py-3.5 rounded-2xl font-black text-sm transition-all flex items-center gap-2 ${
                                                        !userChatInput.trim() || isGenerating
                                                            ? 'bg-slate-800 text-gray-500 cursor-not-allowed'
                                                            : 'bg-amber-500 hover:bg-amber-400 text-slate-950 shadow-lg shadow-amber-500/25'
                                                    }`}
                                                >
                                                    <span>שלח</span>
                                                    <i className="fa-solid fa-paper-plane-rtl"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'invoice' && (
                            <div className="space-y-8 animate-fadeIn max-w-6xl mx-auto">
                                <div className="text-center max-w-xl mx-auto space-y-2">
                                    <h2 className="text-3xl font-black text-white flex items-center justify-center gap-2">מחלץ ישויות מחשבוניות AI 📄✨</h2>
                                    <p className="text-gray-400 text-sm">העלה קובץ PDF של חשבונית, וחלץ ממנו את כל הישויות והנתונים המובנים בלייב באמצעות Gemini!</p>
                                </div>

                                {!apiKey ? (
                                    <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 space-y-6 max-w-md mx-auto shadow-2xl">
                                        <div className="text-center space-y-2">
                                            <div className="bg-amber-500/10 text-amber-400 w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mx-auto">
                                                <i className="fa-solid fa-key"></i>
                                            </div>
                                            <h3 className="text-xl font-bold text-white">חיבור ל-Gemini API</h3>
                                            <p className="text-gray-400 text-xs leading-relaxed">
                                                האפליקציה פועלת ישירות מהדפדפן שלך. כדי להפעיל את הלימוד האינטראקטיבי וחילוץ המסמכים, עליך להזין מפתח API של Gemini (הוא נשמר רק על המחשב שלך באופן מקומי).
                                            </p>
                                        </div>

                                        <form onSubmit={handleSaveApiKey} className="space-y-4">
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-gray-300 block">מפתח API של Gemini:</label>
                                                <input
                                                    type="password"
                                                    placeholder="הכנס מפתח APIzaSy..."
                                                    value={apiKeyInput}
                                                    onChange={(e) => setApiKeyInput(e.target.value)}
                                                    className="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 px-4 text-white text-sm focus:outline-none focus:border-amber-500 transition-all placeholder-gray-600"
                                                />
                                            </div>
                                            <button
                                                type="submit"
                                                className="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-3 rounded-xl transition-all text-sm shadow-lg shadow-amber-500/20"
                                            >
                                                שמור והפעל ממשק
                                            </button>
                                        </form>

                                        <div className="text-center pt-2 border-t border-slate-800">
                                            <a
                                                href="https://aistudio.google.com/"
                                                target="_blank"
                                                rel="noreferrer"
                                                className="text-xs text-amber-400 hover:text-amber-300 underline font-bold flex items-center justify-center gap-1"
                                            >
                                                <span>קבל מפתח API בחינם מ-Google AI Studio</span>
                                                <i className="fa-solid fa-up-right-from-square text-[10px]"></i>
                                            </a>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {/* Left Column: Upload & PDF Preview */}
                                        <div className="space-y-6">
                                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-4">
                                                <h3 className="text-lg font-bold text-white border-b border-slate-850 pb-2">טעינת חשבונית</h3>
                                                
                                                <div className="border-2 border-dashed border-slate-800 hover:border-amber-500/50 rounded-2xl p-8 text-center transition-all cursor-pointer relative bg-slate-950/20">
                                                    <input
                                                        type="file"
                                                        accept="application/pdf"
                                                        onChange={handleInvoiceUpload}
                                                        className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                                                    />
                                                    <div className="space-y-3">
                                                        <div className="bg-amber-500/10 text-amber-400 w-12 h-12 rounded-xl flex items-center justify-center text-2xl mx-auto">
                                                            <i className="fa-solid fa-cloud-arrow-up"></i>
                                                        </div>
                                                        <div>
                                                            <span className="text-sm font-bold text-white block">גרור קובץ PDF או לחץ לבחירה</span>
                                                            <span className="text-xs text-gray-500 block mt-1">אנא העלה קובץ בפורמט PDF בלבד</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                {invoiceFile && (
                                                    <div className="flex items-center justify-between bg-slate-950/60 p-4 rounded-xl border border-slate-800">
                                                        <div className="flex items-center gap-3 overflow-hidden">
                                                            <i className="fa-solid fa-file-pdf text-rose-500 text-2xl shrink-0"></i>
                                                            <div className="overflow-hidden">
                                                                <span className="text-sm font-bold text-gray-200 block truncate">{invoiceFile.name}</span>
                                                                <span className="text-xs text-gray-500 block">{(invoiceFile.size / 1024).toFixed(1)} KB</span>
                                                            </div>
                                                        </div>
                                                        <button
                                                            onClick={handleExtractInvoice}
                                                            disabled={isExtracting}
                                                            className={`px-5 py-2.5 rounded-xl font-black text-xs transition-all flex items-center gap-1.5 ${
                                                                isExtracting
                                                                    ? 'bg-slate-800 text-gray-500 cursor-not-allowed'
                                                                    : 'bg-amber-500 hover:bg-amber-400 text-slate-950 shadow-md shadow-amber-500/10'
                                                            }`}
                                                        >
                                                            {isExtracting ? (
                                                                <>
                                                                    <div className="w-3.5 h-3.5 border-2 border-slate-950 border-t-transparent rounded-full animate-spin"></div>
                                                                    <span>מחלץ...</span>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <i className="fa-solid fa-wand-magic-sparkles"></i>
                                                                    <span>חלץ נתונים ⚡</span>
                                                                </>
                                                            )}
                                                        </button>
                                                    </div>
                                                )}
                                            </div>

                                            {pdfPreviewUrl && (
                                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-4 shadow-xl h-[450px] flex flex-col">
                                                    <h4 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 border-b border-slate-850 pb-2 flex items-center gap-1.5">
                                                        <i className="fa-solid fa-eye text-amber-500"></i>
                                                        <span>תצוגה מקדימה של החשבונית</span>
                                                    </h4>
                                                    <iframe
                                                        src={pdfPreviewUrl}
                                                        className="w-full flex-grow rounded-xl border border-slate-850 bg-slate-950"
                                                        title="PDF Preview"
                                                    ></iframe>
                                                </div>
                                            )}
                                        </div>

                                        {/* Right Column: Extracted Entities Dashboard */}
                                        <div className="space-y-6">
                                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl min-h-[300px] flex flex-col justify-between">
                                                <div className="space-y-6">
                                                    <h3 className="text-lg font-bold text-white border-b border-slate-850 pb-2">נתוני ישויות שחולצו</h3>

                                                    {isExtracting && (
                                                        <div className="text-center py-16 space-y-4">
                                                            <div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                                                            <div className="space-y-1">
                                                                <h4 className="text-sm font-bold text-white">מפענח את החשבונית...</h4>
                                                                <p className="text-xs text-gray-500">Gemini 3.5 Flash מנתח את קובץ ה-PDF ומחלץ ישויות מובנות</p>
                                                            </div>
                                                        </div>
                                                    )}

                                                    {!isExtracting && !extractedData && (
                                                        <div className="text-center py-16 text-gray-500 space-y-3">
                                                            <div className="text-4xl">📊</div>
                                                            <p className="text-sm">אנא העלה חשבונית ולחץ על "חלץ נתונים" כדי להציג את התוצאות</p>
                                                        </div>
                                                    )}

                                                    {!isExtracting && extractedData && extractedData.error && (
                                                        <div className="bg-rose-950/20 border border-rose-500/30 p-4 rounded-2xl text-rose-300 text-sm flex gap-3">
                                                            <i className="fa-solid fa-triangle-exclamation text-rose-400 text-lg shrink-0 mt-0.5"></i>
                                                            <div>
                                                                <span className="font-bold block mb-0.5">שגיאה בפענוח:</span>
                                                                <span>{extractedData.error}</span>
                                                            </div>
                                                        </div>
                                                    )}

                                                    {!isExtracting && extractedData && !extractedData.error && (
                                                        <div className="space-y-6 animate-fadeIn">
                                                            {/* Summary Metadata Cards */}
                                                            <div className="grid grid-cols-2 gap-4">
                                                                <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-800">
                                                                    <span className="text-[10px] text-gray-500 font-bold block uppercase">מזהה חשבונית (Invoice ID)</span>
                                                                    <span className="text-lg font-black text-amber-400 mt-1 block">{extractedData.invoice_id || 'N/A'}</span>
                                                                </div>
                                                                <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-800">
                                                                    <span className="text-[10px] text-gray-500 font-bold block uppercase">ספק / מוביל (Carrier)</span>
                                                                    <span className="text-lg font-black text-blue-400 mt-1 block">{extractedData.carrier || 'N/A'}</span>
                                                                </div>
                                                                <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-800">
                                                                    <span className="text-[10px] text-gray-500 font-bold block uppercase">תאריך חשבונית (Invoice Date)</span>
                                                                    <span className="text-sm font-bold text-gray-200 mt-1 block">{extractedData.invoice_date || 'N/A'}</span>
                                                                </div>
                                                                <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-800">
                                                                    <span className="text-[10px] text-gray-500 font-bold block uppercase">תאריך פירעון (Due Date)</span>
                                                                    <span className="text-sm font-bold text-gray-200 mt-1 block">{extractedData.due_date || 'N/A'}</span>
                                                                </div>
                                                            </div>

                                                            {/* Financial Info block */}
                                                            <div className="bg-slate-950/30 border border-slate-850 p-5 rounded-2xl space-y-3">
                                                                <div className="flex justify-between items-center text-sm">
                                                                    <span className="text-gray-400">סכום ששולם:</span>
                                                                    <span className="font-black text-xl text-emerald-400">
                                                                        {extractedData.amount_paid_since_last_invoice || '0.00'} {extractedData.currency}
                                                                    </span>
                                                                </div>
                                                                <div className="flex justify-between items-center text-xs text-gray-500 border-t border-slate-850 pt-2">
                                                                    <span>עלויות שילוח (Freight):</span>
                                                                    <span>{extractedData.freight_amount || '0.00'} {extractedData.currency}</span>
                                                                </div>
                                                                {extractedData.currency_exchange_rate && (
                                                                    <div className="flex justify-between items-center text-[10px] text-gray-600">
                                                                        <span>שער חליפין (Exchange Rate):</span>
                                                                        <span>{extractedData.currency_exchange_rate}</span>
                                                                    </div>
                                                                )}
                                                            </div>

                                                            {/* Line Items Table */}
                                                            {extractedData.line_items && extractedData.line_items.length > 0 && (
                                                                <div className="space-y-3">
                                                                    <h4 className="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-1.5">
                                                                        <i className="fa-solid fa-list-ul text-amber-500"></i>
                                                                        <span>פריטים מפורטים (Line Items)</span>
                                                                    </h4>
                                                                    <div className="overflow-x-auto rounded-xl border border-slate-800 bg-slate-950/20">
                                                                        <table className="w-full text-right text-xs">
                                                                            <thead className="bg-slate-950 text-gray-400 uppercase font-bold border-b border-slate-850">
                                                                                <tr>
                                                                                    <th className="px-4 py-3">תיאור</th>
                                                                                    <th className="px-3 py-3">מק"ט</th>
                                                                                    <th className="px-2 py-3 text-center">כמות</th>
                                                                                    <th className="px-3 py-3 text-left">מחיר יחידה</th>
                                                                                    <th className="px-4 py-3 text-left">סה"כ</th>
                                                                                </tr>
                                                                            </thead>
                                                                            <tbody className="divide-y divide-slate-850 text-gray-300">
                                                                                {extractedData.line_items.map((item, index) => (
                                                                                    <tr key={index} className="hover:bg-slate-900/40">
                                                                                        <td className="px-4 py-3 font-semibold">{item.description || 'N/A'}</td>
                                                                                        <td className="px-3 py-3 text-gray-500 font-mono">{item.product_code || 'N/A'}</td>
                                                                                        <td className="px-2 py-3 text-center font-bold">{item.quantity || '0'} {item.unit || ''}</td>
                                                                                        <td className="px-3 py-3 text-left font-mono">{item.unit_price || '0.00'}</td>
                                                                                        <td className="px-4 py-3 text-left font-mono text-amber-400 font-bold">{item.amount || '0.00'}</td>
                                                                                    </tr>
                                                                                ))}
                                                                            </tbody>
                                                                        </table>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Collapsible raw JSON block */}
                                            {!isExtracting && extractedData && !extractedData.error && (
                                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-lg">
                                                    <details className="group cursor-pointer">
                                                        <summary className="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center justify-between outline-none select-none">
                                                            <span className="flex items-center gap-1.5">
                                                                <i className="fa-solid fa-code text-blue-500"></i>
                                                                <span>צפייה ב-JSON הגולמי</span>
                                                            </span>
                                                            <i className="fa-solid fa-chevron-down text-[10px] group-open:rotate-180 transition-transform"></i>
                                                        </summary>
                                                        <pre className="mt-4 p-4 rounded-xl bg-slate-950 border border-slate-850 text-[10px] font-mono text-emerald-400 overflow-x-auto select-all leading-normal">
                                                            {JSON.stringify(extractedData, null, 2)}
                                                        </pre>
                                                    </details>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-gray-800 bg-[#0f172a] py-6 px-6 text-center text-xs text-gray-500">
                        <div className="max-w-7xl mx-auto space-y-2">
                            <p>© 2026 GemaraSpark. כל הזכויות שמורות לבית המדרש הדיגיטלי החדש.</p>
                            <p>נבנה באהבה להנגשת ארון הספרים היהודי לדור הבא 📖✨</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
