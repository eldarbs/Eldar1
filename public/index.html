        // Custom Synthesized Audio Engine (No external dependencies)
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'success') {
                    // Upward arpeggio
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(330, ctx.currentTime); // E4
                    osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.3); // E5
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.32);
                } else if (type === 'error') {
                    // Downward buzz
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'click') {
                    // Quick pop
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(500, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'level-up') {
                    // Majestic trumpet sound
                    const now = ctx.currentTime;
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(261.63, now); // C4
                    osc.frequency.setValueAtTime(329.63, now + 0.1); // E4
                    osc.frequency.setValueAtTime(392.00, now + 0.2); // G4
                    osc.frequency.setValueAtTime(523.25, now + 0.3); // C5
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0.1, now + 0.4);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
                    osc.start();
                    osc.stop(now + 0.6);
                }
            } catch (e) {
                console.log("Audio contexts aren't fully active yet or not supported.");
            }
        };

        const CHARACTERS = [

                ],
                explanation: 'מכיוון שלשטרות מפוזרים אין סימן מזהה והם נפלו במקום ציבורי, הבעלים מתייאש מייד כשהוא מגלה את האבידה, ולכן המוצא רשאי לשמור אותם.'
            },
            {

                options: [
                    { text: 'תיקו כדורגל, שני הצדדים מסכימים שהם שווים', isCorrect: false },
                    { text: 'תעמוד (השאלה לא נפתרה) ויושבה עד שיבוא אליהו הנביא לתרץ אותה', isCorrect: true },
                    { text: 'קדימה לפתור, תיקו זה פקודה להתחיל ויכוח חדש', isCorrect: false },

                ],
                explanation: 'תיקו פירושו "תעמוד". הנושא נשאר תלוי ועומד ללא הכרעה, ומבחינה קבלית/מסורתית ראשי התיבות של תִּיק"וּ הן: תשבי (אליהו הנביא) יתרץ קושיות ואיבעיות.'

            {
                question: 'מי המנצח ברוב המוחלט של הויכוחים ("מחלוקות") בין אביי לרבא?',
                options: [

                ],

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [selectedSugya, setSelectedSugya] = useState(SUGYOT[0]);
            const [sugyaStep, setSugyaStep] = useState(0);
            
            // Battle game states
            const [battleLog, setBattleLog] = useState([]);
            const [battleWinner, setBattleWinner] = useState(null);
            const [isBattling, setIsBattling] = useState(false);
            const [selectedWarrior, setSelectedWarrior] = useState(null);

            // Dictionary search states
            const [searchTerm, setSearchTerm] = useState('');
            const [flippedCardIndex, setFlippedCardIndex] = useState(null);

            // Quiz states
            const [currentQuizIndex, setCurrentQuizIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(3); // Demo initial streak
            const [quizCompleted, setQuizCompleted] = useState(false);

            // Custom Notification Toast
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const triggerToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                playSound(type);
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3500);
            };

            const runBattleSimulation = (playerChoice) => {
                if (isBattling) return;
                setIsBattling(true);
                setBattleWinner(null);
                setBattleLog([]);
                playSound('click');

                const opponent = CHARACTERS.find(c => c.name !== playerChoice.name);
                let log = [];
                log.push({ text: `⚔️ הקרב מתחיל! ${playerChoice.emoji} ${playerChoice.name} נגד ${opponent.emoji} ${opponent.name}`, type: 'intro' });

                setTimeout(() => {
                    log.push({ text: `🎤 הנושא הנדון: "מצאת ארנק ברחוב שהבעלים עוד לא גילה שנאבד לו"`, type: 'topic' });
                    setBattleLog([...log]);
                }, 800);

                setTimeout(() => {
                    log.push({ 
                        text: `🗣️ ${playerChoice.name} מטיל את קלף השילוב: "${playerChoice.specialMove}"!`, 
                        type: 'attack' 
                    });
                    setBattleLog([...log]);
                    playSound('click');
                }, 1800);

                setTimeout(() => {
                    log.push({ 
                        text: `🛡️ ${opponent.name} מגיב במתקפת נגד מבריקה ומצטט מסכת שלמה כדי להדוף!`, 
                        type: 'defense' 
                    });
                    setBattleLog([...log]);
                    playSound('click');
                }, 3000);

                setTimeout(() => {
                    // Decide winner based on stats & slight random offset
                    const playerPower = playerChoice.stats.logic + playerChoice.stats.speed + Math.floor(Math.random() * 10);
                    const opponentPower = opponent.stats.logic + opponent.stats.speed + Math.floor(Math.random() * 10);
                    
                    let winner = playerPower >= opponentPower ? playerChoice : opponent;
                    
                    // Historic Easter egg: Rava wins most of the time unless it is one of the YAL...
                    if (playerChoice.name === 'רבא' && Math.random() > 0.3) {
                        winner = playerChoice;
                    }

                    log.push({ 
                        text: `🏆 תוצאה: השכל הישר ניצח! ${winner.name} קיבל את הכרעת בת הקול של בית המדרש!`, 
                        type: 'victory' 
                    });
                    setBattleLog([...log]);
                    setBattleWinner(winner);
                    setIsBattling(false);
                    triggerToast(`הקרב הסתיים! הניצחון ל${winner.name}`, 'level-up');
                }, 4500);
            };

            const handleQuizAnswer = (option, idx) => {
                if (isAnswered) return;
                setSelectedOption(idx);
                setIsAnswered(true);

                if (option.isCorrect) {
                    setScore(prev => prev + 10);
                    setStreak(prev => prev + 1);
                    triggerToast('מדהים! תשובה נכונה פירקה את הקושיא! 🔥', 'success');
                } else {
                    setStreak(0);
                    triggerToast('לא מדויק, אבל מכל קושיה לומדים משהו חדש! 💡', 'error');
                }
            };

            const nextQuestion = () => {
                setSelectedOption(null);
                setIsAnswered(false);
                if (currentQuizIndex < QUIZ.length - 1) {
                    setCurrentQuizIndex(prev => prev + 1);
                } else {
                    setQuizCompleted(true);
                    triggerToast('סיימתם את המבחן השבועי! כל הכבוד! 👑', 'level-up');
                }
            };

            const restartQuiz = () => {
                setCurrentQuizIndex(0);
                setSelectedOption(null);
                setIsAnswered(false);
                setScore(0);
                setQuizCompleted(false);
            };

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* Header */}
                    <header className="border-b border-gray-800 bg-[#0f172a] py-4 px-6 sticky top-0 z-50 shadow-lg">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setActiveTab('home'); playSound('click'); }}>
                                <div className="bg-gradient-to-tr from-amber-500 to-yellow-400 p-2.5 rounded-xl text-[#0b0f19] font-black text-2xl shadow-lg shadow-amber-500/20">
                                    <i className="fa-solid fa-scroll"></i>

                                </div>

                                {battleLog.length > 0 && (
                                    <div className="max-w-2xl mx-auto bg-slate-950 border border-slate-800 rounded-3xl p-6 space-y-4 shadow-xl">
                                        <h4 className="text-sm font-bold text-gray-500 uppercase tracking-widest border-b border-slate-900 pb-2">לוג הדיונים בבית המדרש</h4>
                                        <div className="space-y-3 font-serif">
                                            {battleLog.map((logItem, idx) => (
                                                <p 
                                                    key={idx} 
                                                    className={`text-base leading-relaxed ${
                                                        logItem.type === 'intro' ? 'text-gray-400 font-sans border-b border-slate-900 pb-2' :
                                                        logItem.type === 'topic' ? 'text-indigo-400 font-bold' :
                                                        logItem.type === 'attack' ? 'text-amber-400' :
                                                        logItem.type === 'defense' ? 'text-blue-400' :
                                                        'text-emerald-400 font-sans font-black text-lg bg-emerald-950/20 p-3 rounded-xl border border-emerald-500/30'
                                                    }`}
                                                >
                                                    {logItem.text}
                                                </p>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'dictionary' && (
                            <div className="space-y-8 animate-fadeIn">
                                <div className="text-center max-w-xl mx-auto space-y-2">
                                    <h2 className="text-3xl font-black text-white">מילון סלנג ארמי 📖</h2>
                                    <p className="text-gray-400 text-sm">הפוך את כרטיסיות המילים כדי להבין את השפה הסודית של התלמוד!</p>
                                </div>

                                <div className="max-w-md mx-auto">
                                    <div className="relative">
                                        <input
                                            type="text"
                                            placeholder="חיפוש מילה או פירוש..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            className="w-full bg-slate-900 border border-slate-800 rounded-2xl py-3.5 px-5 pr-12 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 transition-all text-sm"
                                        />
                                        <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {DICTIONARY.filter(item => 
                                        item.aramaic.includes(searchTerm) || 
                                        item.meaning.includes(searchTerm) || 
                                        item.slang.includes(searchTerm)
                                    ).map((item, idx) => (
                                        <div 
                                            key={idx}
                                            onClick={() => { setFlippedCardIndex(flippedCardIndex === idx ? null : idx); playSound('click'); }}
                                            className={`flip-card h-48 cursor-pointer ${flippedCardIndex === idx ? 'flipped' : ''}`}
                                        >
                                            <div className="flip-card-inner relative w-full h-full text-center">
                                                {/* Front */}
                                                <div className="flip-card-front absolute w-full h-full bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col justify-between items-center shadow-lg hover:border-amber-500/30 transition-all">
                                                    <span className="bg-slate-950 text-gray-500 text-xs px-2.5 py-0.5 rounded-full font-bold">{item.category}</span>
                                                    <h3 className="text-3xl font-black text-amber-400 tracking-wide font-serif">{item.aramaic}</h3>
                                                    <span className="text-xs text-gray-500"><i className="fa-solid fa-rotate-left ml-1"></i>לחצו כדי להפוך</span>
                                                </div>
                                                {/* Back */}
                                                <div className="flip-card-back absolute w-full h-full bg-[#1e293b] border border-slate-700 rounded-2xl p-6 flex flex-col justify-between items-center shadow-lg">
                                                    <div className="space-y-2">
                                                        <h4 className="text-sm font-bold text-gray-400">פירוש מילולי:</h4>
                                                        <p className="text-white font-bold text-lg">{item.meaning}</p>
                                                    </div>
                                                    <div className="space-y-1">
                                                        <h4 className="text-xs font-bold text-amber-400">הסבר בסלנג:</h4>
                                                        <p className="text-gray-300 text-sm leading-relaxed">{item.slang}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'quiz' && (
                            <div className="space-y-8 animate-fadeIn max-w-2xl mx-auto">
                                {!quizCompleted ? (
                                    <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 space-y-6 shadow-xl">
                                        {/* Quiz Header */}
                                        <div className="flex justify-between items-center border-b border-slate-800 pb-4">
                                            <div>
                                                <span className="text-xs text-amber-500 font-bold uppercase tracking-wider">שאלה {currentQuizIndex + 1} מתוך {QUIZ.length}</span>
                                                <h3 className="text-xl font-bold text-white mt-1">חידון האלופים 🏆</h3>
                                            </div>
                                            <div className="flex items-center gap-1.5 text-blue-400">
                                                <i className="fa-solid fa-trophy"></i>
                                                <span className="font-bold">{score} נק׳</span>
                                            </div>
                                        </div>

                                        {/* Question */}
                                        <div className="space-y-4">
                                            <p className="text-white font-bold text-lg md:text-xl leading-relaxed">{QUIZ[currentQuizIndex].question}</p>
                                            
                                            <div className="space-y-3 pt-2">
                                                {QUIZ[currentQuizIndex].options.map((option, idx) => (
                                                    <button
                                                        key={idx}
                                                        disabled={isAnswered}
                                                        onClick={() => handleQuizAnswer(option, idx)}
                                                        className={`w-full text-right p-4 rounded-xl border font-bold transition-all text-sm ${
                                                            isAnswered
                                                                ? option.isCorrect
                                                                    ? 'bg-emerald-950/40 border-emerald-500 text-emerald-300'
                                                                    : selectedOption === idx
                                                                    ? 'bg-rose-950/40 border-rose-500 text-rose-300'
                                                                    : 'bg-slate-950/40 border-slate-800 text-gray-500'
                                                                : 'bg-slate-950/40 border-slate-800 text-gray-300 hover:border-slate-700 hover:bg-slate-900/60'
                                                        }`}
                                                    >
                                                        <div className="flex items-center justify-between">
                                                            <span>{option.text}</span>
                                                            {isAnswered && option.isCorrect && <i className="fa-solid fa-circle-check text-emerald-400"></i>}
                                                            {isAnswered && !option.isCorrect && selectedOption === idx && <i className="fa-solid fa-circle-xmark text-rose-400"></i>}
                                                        </div>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Explanation & Next */}
                                        {isAnswered && (
                                            <div className="space-y-4 pt-4 border-t border-slate-800 animate-fadeIn">
                                                <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-sm text-gray-300 leading-relaxed">
                                                    <span className="font-bold text-white block mb-1">הסבר:</span>
                                                    {QUIZ[currentQuizIndex].explanation}
                                                </div>
                                                <div className="text-left">
                                                    <button
                                                        onClick={nextQuestion}
                                                        className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-6 py-2.5 rounded-xl text-sm transition-all"
                                                    >
                                                        {currentQuizIndex === QUIZ.length - 1 ? 'תוצאות' : 'השאלה הבאה'}
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center space-y-6 shadow-xl">
                                        <div className="text-6xl">👑</div>
                                        <div className="space-y-2">
                                            <h3 className="text-3xl font-black text-white">כל הכבוד!</h3>
                                            <p className="text-gray-400">סיימתם את החידון בהצלחה רבה.</p>
                                        </div>
                                        <div className="bg-slate-950 border border-slate-800 rounded-2xl p-6 max-w-xs mx-auto">
                                            <span className="text-xs text-gray-500 font-bold block uppercase mb-1">הניקוד שלך</span>
                                            <span className="text-4xl font-black text-amber-400">{score} נקודות</span>
                                        </div>
                                        <button
                                            onClick={restartQuiz}
                                            className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-8 py-3 rounded-xl text-sm transition-all"
                                        >
                                            חידון חוזר
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-gray-800 bg-[#0f172a] py-6 px-6 text-center text-xs text-gray-500">
                        <div className="max-w-7xl mx-auto space-y-2">
                            <p>© 2026 GemaraSpark. כל הזכויות שמורות לבית המדרש הדיגיטלי החדש.</p>
                            <p>נבנה באהבה להנגשת ארון הספרים היהודי לדור הבא 📖✨</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
